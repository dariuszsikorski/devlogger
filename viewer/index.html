<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E%E2%97%89%3C/text%3E%3C/svg%3E" />
    <title>devlogger-viewer</title>
  </head>
  <body>
    <script>
      // Restore --surface-base + --root-font-size przed pierwszym paintem (FOUC).
      // OBIE zmienne ladowane sa do <style id="theme-vars">, nie inline na <html>.
      // Inline na <html> ma wyzsza specyficznosc niz :root w stylesheet i blokowal
      // pozniejsze nadpisanie przez themeStyle store (slider nie ruszal sie).
      // Zakres i prog MUSZA byc identyczne z ThemeSlider/useSemanticColors (0.10..1.0, 0.67).
      (function () {
        var b = 0.18;
        var f = 13;
        try {
          var rawB = localStorage.getItem('devlogger.brightness');
          var parsedB = rawB === null ? b : parseFloat(rawB);
          if (parsedB >= 0.10 && parsedB <= 1.0) b = parsedB;
        } catch (e) { /* ignore */ }
        try {
          var rawF = localStorage.getItem('devlogger.fontsize');
          var parsedF = rawF === null ? f : parseFloat(rawF);
          if (parsedF >= 9 && parsedF <= 28) f = parsedF;
        } catch (e) { /* ignore */ }

        // !important jest tu tylko FOUC guardem (dla 2 zmiennych do pierwszego renderu themeStyle,
        // ktory przesuwa tag na koniec <head> i wygrywa potem po source-order BEZ !important).
        var style = document.createElement('style');
        style.id = 'theme-vars';
        style.textContent =
          ':root {\n' +
          '  --surface-base: oklch(' + b + ' 0.005 255) !important;\n' +
          '  --root-font-size: ' + f.toFixed(1) + 'px !important;\n' +
          '}';
        document.head.appendChild(style);
        document.documentElement.classList.add(b < 0.67 ? 'theme-dark' : 'theme-light');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
