<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>devlogger-viewer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="Header">
    <h1 class="Header_title">devlogger-viewer</h1>
    <div class="Header_meta">
      <span class="Header_status" id="status">disconnected</span>
      <span class="Header_count" id="count">0 entries</span>
      <button class="Header_clear" id="clear">clear</button>
    </div>
  </header>

  <section class="Filters">
    <input class="Filters_search" id="search" placeholder="filter (text in any field)" />
    <select class="Filters_app" id="appFilter"><option value="">all apps</option></select>
    <select class="Filters_level" id="levelFilter">
      <option value="">all levels</option>
      <option value="log">log</option>
      <option value="info">info</option>
      <option value="warn">warn</option>
      <option value="error">error</option>
      <option value="debug">debug</option>
    </select>
  </section>

  <main class="Stream" id="stream"></main>

  <script src="./viewer.js" type="module"></script>
</body>
</html>
